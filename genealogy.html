<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学術知識の系譜 | Academic Knowledge Genealogy</title>
  <link rel="icon" href="https://esse-sense.com/favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FAFAF8; --card: #FFF; --text: #1A1A1A; --text2: #555; --muted: #999;
      --border: #E5E5E5; --surface: #F0EFEC; --accent: #CC1400;
      --font: "Noto Sans JP", system-ui, sans-serif;
      --serif: "Noto Serif JP", Georgia, serif;
      --hum: #CC1400; --soc: #2563EB; --nat: #16A34A; --eng: #7C3AED; --art: #EA580C;
    }
    [data-theme="dark"] {
      --bg: #0C0C0C; --card: #181818; --text: #DDD; --text2: #999; --muted: #555;
      --border: #282828; --surface: #141414; --accent: #EE3333;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); color: var(--text); background: var(--bg); overflow: hidden; }

    /* ── Top bar ── */
    .top {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: 44px; background: var(--card); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 16px; gap: 12px;
    }
    .top a { font-size: 0.72rem; color: var(--muted); text-decoration: none; }
    .top a:hover { color: var(--text); }
    .top h1 { font-family: var(--serif); font-size: 0.88rem; font-weight: 700; }
    .top .spacer { flex: 1; }
    .top .stats { font-size: 0.64rem; color: var(--muted); display: flex; gap: 8px; }
    .top .stats b { color: var(--text2); }
    .btn-s { background: var(--surface); border: 1px solid var(--border); border-radius: 4px;
      padding: 2px 6px; cursor: pointer; font-size: 0.78rem; color: var(--muted); }
    .btn-s:hover { color: var(--text); border-color: var(--muted); }

    /* ── Filter bar ── */
    .filters {
      position: fixed; top: 44px; left: 0; right: 0; z-index: 99;
      height: 34px; background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 16px; gap: 8px; overflow-x: auto;
    }
    .chip {
      font-size: 0.62rem; padding: 2px 9px; border-radius: 12px; cursor: pointer;
      border: 1px solid var(--border); background: var(--card); color: var(--muted);
      white-space: nowrap; font-weight: 500; transition: all 0.15s; user-select: none;
    }
    .chip:hover { border-color: var(--muted); }
    .chip.on { color: #fff; border-color: transparent; }
    .chip[data-d="humanities_concept"].on { background: var(--hum); }
    .chip[data-d="social_theory"].on { background: var(--soc); }
    .chip[data-d="natural_discovery"].on { background: var(--nat); }
    .chip[data-d="engineering_method"].on { background: var(--eng); }
    .chip[data-d="arts_question"].on { background: var(--art); }
    .vr { width: 1px; height: 14px; background: var(--border); flex-shrink: 0; }
    .filters label { font-size: 0.62rem; color: var(--muted); }
    .filters input[type="range"] { width: 100px; accent-color: var(--accent); }
    .era-v { font-size: 0.64rem; color: var(--text2); font-variant-numeric: tabular-nums; min-width: 30px; text-align: center; }
    .search-box {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 1px 8px; display: flex; align-items: center;
    }
    .search-box input { border: none; background: none; font-size: 0.66rem; width: 100px;
      outline: none; color: var(--text); font-family: var(--font); }
    .search-box input::placeholder { color: var(--muted); }

    /* ── Timeline ruler ── */
    .ruler {
      position: fixed; top: 78px; left: 120px; right: 0; z-index: 98;
      height: 24px; background: var(--card); border-bottom: 1px solid var(--border);
      overflow: hidden;
    }
    .ruler canvas { width: 100%; height: 100%; }

    /* ── Lane labels (left sidebar) ── */
    .lane-labels {
      position: fixed; top: 102px; left: 0; bottom: 0; width: 120px;
      z-index: 97; background: var(--card); border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
    }
    .lane-label {
      flex: 1; display: flex; align-items: center; justify-content: flex-end;
      padding-right: 12px; font-size: 0.72rem; font-weight: 600;
      font-family: var(--serif); border-bottom: 1px solid var(--border);
      cursor: default;
    }

    /* ── Main canvas ── */
    .main-area {
      position: fixed; top: 102px; left: 120px; right: 0; bottom: 0;
      overflow: hidden; cursor: grab;
    }
    .main-area:active { cursor: grabbing; }
    .main-area canvas { display: block; }

    /* ── Detail panel ── */
    .panel {
      position: fixed; top: 102px; right: 0; bottom: 0; width: 300px;
      background: var(--card); border-left: 1px solid var(--border);
      z-index: 96; transform: translateX(100%); transition: transform 0.2s ease;
      overflow-y: auto; padding: 16px;
    }
    .panel.open { transform: translateX(0); }
    .panel .close { position: absolute; top: 8px; right: 10px; cursor: pointer;
      background: none; border: none; font-size: 1rem; color: var(--muted); }
    .panel .close:hover { color: var(--text); }
    .p-dom { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.06em; margin-bottom: 2px; }
    .p-name { font-family: var(--serif); font-size: 1rem; font-weight: 700; line-height: 1.35; }
    .p-en { font-size: 0.72rem; color: var(--muted); margin-bottom: 6px; }
    .p-era { font-size: 0.68rem; color: var(--accent); font-weight: 500; margin-bottom: 10px; }
    .p-def { font-size: 0.74rem; color: var(--text2); line-height: 1.7; margin-bottom: 10px; }
    .p-tags span { font-size: 0.62rem; background: var(--surface); padding: 1px 7px;
      border-radius: 8px; display: inline-block; margin: 1px 2px; color: var(--muted); }
    .p-conn { margin-top: 12px; border-top: 1px solid var(--border); padding-top: 10px; }
    .p-conn h4 { font-size: 0.66rem; color: var(--muted); font-weight: 600; margin-bottom: 4px; }
    .p-conn-item { font-size: 0.68rem; padding: 3px 0; cursor: pointer; color: var(--text2);
      border-bottom: 1px solid var(--border); }
    .p-conn-item:hover { color: var(--accent); }

    /* ── Legend ── */
    .legend {
      position: fixed; bottom: 10px; right: 10px; z-index: 96;
      font-size: 0.58rem; color: var(--muted); background: var(--card);
      border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px;
      opacity: 0.85;
    }
    .legend div { display: flex; align-items: center; gap: 4px; margin: 1px 0; }
    .legend .dot { width: 6px; height: 6px; border-radius: 50%; }
    .legend .zoom-hint { margin-top: 4px; border-top: 1px solid var(--border); padding-top: 4px; }

    /* ── Loading ── */
    .loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
      z-index: 200; text-align: center; font-size: 0.78rem; color: var(--muted); }
    .ld-bar { width: 100px; height: 2px; background: var(--border); margin: 6px auto;
      border-radius: 1px; overflow: hidden; }
    .ld-bar::after { content: ''; display: block; width: 30%; height: 100%;
      background: var(--accent); animation: ld 0.8s ease infinite; }
    @keyframes ld { 0%{transform:translateX(-100%)} 100%{transform:translateX(400%)} }

    @media(max-width:768px) {
      .lane-labels { width: 60px; }
      .lane-label { font-size: 0.58rem; padding-right: 6px; }
      .ruler, .main-area { left: 60px; }
      .panel { width: 100%; }
    }
  </style>
</head>
<body>
<div class="top">
  <a href="index.html">&larr; DB</a>
  <h1>学術知識の系譜</h1>
  <div class="spacer"></div>
  <div class="stats">
    <span><b id="sN">0</b> 概念</span>
    <span><b id="sL">0</b> 関係</span>
  </div>
  <button class="btn-s" onclick="resetZoom()">全体表示</button>
  <button class="btn-s" onclick="document.documentElement.dataset.theme=document.documentElement.dataset.theme==='dark'?'':'dark';requestRedraw()">&#9790;</button>
</div>

<div class="filters">
  <span class="chip on" data-d="humanities_concept">人文学</span>
  <span class="chip on" data-d="social_theory">社会科学</span>
  <span class="chip on" data-d="natural_discovery">自然科学</span>
  <span class="chip on" data-d="engineering_method">工学</span>
  <span class="chip on" data-d="arts_question">芸術</span>
  <div class="vr"></div>
  <label>時代</label>
  <span class="era-v" id="evMin">-500</span>
  <input type="range" id="rMin" min="-500" max="2025" value="-500" step="10">
  <input type="range" id="rMax" min="-500" max="2025" value="2025" step="10">
  <span class="era-v" id="evMax">2025</span>
  <div class="vr"></div>
  <div class="search-box"><input type="text" id="searchIn" placeholder="検索..."></div>
</div>

<div class="ruler"><canvas id="rCvs"></canvas></div>
<div class="lane-labels" id="laneLabels"></div>
<div class="main-area" id="mainArea"><canvas id="mCvs"></canvas></div>

<div class="panel" id="panel">
  <button class="close" onclick="closePanel()">&times;</button>
  <div id="panelBody"></div>
</div>

<div class="legend">
  <div><div class="dot" style="background:var(--hum)"></div>人文学</div>
  <div><div class="dot" style="background:var(--soc)"></div>社会科学</div>
  <div><div class="dot" style="background:var(--nat)"></div>自然科学</div>
  <div><div class="dot" style="background:var(--eng)"></div>工学</div>
  <div><div class="dot" style="background:var(--art)"></div>芸術</div>
  <div class="zoom-hint">スクロール: 横ズーム / ドラッグ: 移動</div>
</div>

<div class="loading" id="loading">読み込み中<div class="ld-bar"></div></div>

<script>
// ═══════ Config ═══════
const COLORS = { humanities_concept:"#CC1400", social_theory:"#2563EB", natural_discovery:"#16A34A", engineering_method:"#7C3AED", arts_question:"#EA580C" };
const DORDER = ["humanities_concept","social_theory","natural_discovery","engineering_method","arts_question"];
const DLABEL = { humanities_concept:"人文学", social_theory:"社会科学", natural_discovery:"自然科学", engineering_method:"工学", arts_question:"芸術" };

// ═══════ State ═══════
let data = null;
let activeD = new Set(DORDER);
let eraMin = -500, eraMax = 2025, query = "";
let offsetX = 0;       // horizontal pan in pixels
let zoomX = 1;          // horizontal zoom factor
let nodes = [], links = [];
let posMap = new Map();  // id -> {x, y}  (x=world, y=screen-fraction 0..1)
let nodeMap = new Map(); // id -> node
let linkIdx = new Map(); // id -> [linkIndex]
let hovered = null, selected = null;
let dragging = false, dragSX = 0, dragOX = 0;
let _redraw = true;

const mainArea = document.getElementById("mainArea");
const cvs = document.getElementById("mCvs");
const ctx = cvs.getContext("2d");
const rCvs = document.getElementById("rCvs");
const rCtx = rCvs.getContext("2d");

let W, H, dpr;
function resize() {
  dpr = window.devicePixelRatio || 1;
  W = mainArea.clientWidth; H = mainArea.clientHeight;
  cvs.width = W * dpr; cvs.height = H * dpr;
  cvs.style.width = W + "px"; cvs.style.height = H + "px";
  const rw = rCvs.parentElement.clientWidth;
  rCvs.width = rw * dpr; rCvs.height = 24 * dpr;
  rCvs.style.width = rw + "px"; rCvs.style.height = "24px";
  buildLaneLabels();
}
resize();

// ═══════ Non-linear era → worldX ═══════
// Give each century-ish bucket proportional screen space
const WORLD_W = 10000;
const SEGS = [
  {s:-500, e:500, w:0.10}, {s:500, e:1500, w:0.08}, {s:1500, e:1800, w:0.10},
  {s:1800, e:1900, w:0.14}, {s:1900, e:1960, w:0.16}, {s:1960, e:2000, w:0.20}, {s:2000, e:2026, w:0.22},
];
function eraToX(era) {
  let off = 0;
  for (const s of SEGS) {
    if (era <= s.s) return off * WORLD_W;
    if (era <= s.e) return (off + ((era - s.s) / (s.e - s.s)) * s.w) * WORLD_W;
    off += s.w;
  }
  return WORLD_W;
}
function xToScreen(wx) { return wx * zoomX + offsetX; }
function screenToX(sx) { return (sx - offsetX) / zoomX; }

// ═══════ Y: fixed screen lanes ═══════
function activeLanes() { return DORDER.filter(d => activeD.has(d)); }
function laneY(domain) {
  const lanes = activeLanes();
  const idx = lanes.indexOf(domain);
  if (idx < 0) return -999;
  const lH = H / lanes.length;
  return idx * lH + lH / 2;
}
function laneH() { const n = activeLanes().length; return n > 0 ? H / n : H; }

// ═══════ Lane labels ═══════
function buildLaneLabels() {
  const el = document.getElementById("laneLabels");
  el.innerHTML = "";
  activeLanes().forEach(d => {
    const div = document.createElement("div");
    div.className = "lane-label";
    div.style.color = COLORS[d];
    div.textContent = DLABEL[d];
    el.appendChild(div);
  });
}

// ═══════ Data Processing ═══════
function hashJitter(id) {
  let h = 0;
  for (let i = 0; i < id.length; i++) h = ((h << 5) - h + id.charCodeAt(i)) | 0;
  return (h % 1000) / 1000 - 0.5;
}

function process() {
  if (!data) return;
  nodes = data.nodes.filter(n =>
    activeD.has(n.domain) && n.era_start != null &&
    n.era_start >= eraMin && n.era_start <= eraMax &&
    (!query || (n.name_ja || "").includes(query) || (n.name_en || "").toLowerCase().includes(query.toLowerCase()))
  );
  const ids = new Set(nodes.map(n => n.id));
  links = data.links.filter(l => ids.has(l.source) && ids.has(l.target));

  nodeMap.clear(); posMap.clear(); linkIdx.clear();
  const lH = laneH();
  nodes.forEach(n => {
    nodeMap.set(n.id, n);
    const wx = eraToX(n.era_start);
    const sy = laneY(n.domain) + hashJitter(n.id) * lH * 0.7;
    posMap.set(n.id, { wx, sy });
  });
  links.forEach((l, i) => {
    if (!linkIdx.has(l.source)) linkIdx.set(l.source, []);
    if (!linkIdx.has(l.target)) linkIdx.set(l.target, []);
    linkIdx.get(l.source).push(i);
    linkIdx.get(l.target).push(i);
  });

  document.getElementById("sN").textContent = nodes.length.toLocaleString();
  document.getElementById("sL").textContent = links.length.toLocaleString();
  buildLaneLabels();
}

// ═══════ Drawing ═══════
function draw() {
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, W, H);
  const dark = document.documentElement.dataset.theme === "dark";

  // Visible world-x range
  const wxL = screenToX(0), wxR = screenToX(W);

  // ── Era bands ──
  SEGS.forEach((seg, i) => {
    const sx1 = xToScreen(eraToX(seg.s));
    const sx2 = xToScreen(eraToX(seg.e));
    if (sx2 < 0 || sx1 > W) return;
    if (i % 2 === 0) {
      ctx.fillStyle = dark ? "rgba(255,255,255,0.02)" : "rgba(0,0,0,0.025)";
      ctx.fillRect(sx1, 0, sx2 - sx1, H);
    }
    // boundary
    ctx.strokeStyle = dark ? "rgba(255,255,255,0.05)" : "rgba(0,0,0,0.06)";
    ctx.lineWidth = 0.5;
    ctx.setLineDash([3, 3]);
    ctx.beginPath(); ctx.moveTo(sx1, 0); ctx.lineTo(sx1, H); ctx.stroke();
    ctx.setLineDash([]);
  });

  // ── Lane separators ──
  const lanes = activeLanes();
  const lH = laneH();
  lanes.forEach((d, i) => {
    const y = i * lH + lH;
    if (i < lanes.length - 1) {
      ctx.strokeStyle = dark ? "rgba(255,255,255,0.06)" : "rgba(0,0,0,0.06)";
      ctx.lineWidth = 0.5;
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }
  });

  // ── Links ──
  const hlId = hovered ? hovered.id : selected ? selected.id : null;
  const connSet = new Set();
  if (hlId && linkIdx.has(hlId)) linkIdx.get(hlId).forEach(i => connSet.add(i));

  links.forEach((l, idx) => {
    const sp = posMap.get(l.source), tp = posMap.get(l.target);
    if (!sp || !tp) return;
    const sx1 = xToScreen(sp.wx), sx2 = xToScreen(tp.wx);
    if (Math.max(sx1, sx2) < -50 || Math.min(sx1, sx2) > W + 50) return;

    const isHL = connSet.has(idx);
    ctx.globalAlpha = hlId ? (isHL ? 0.6 : 0.03) : 0.15;
    const sn = nodeMap.get(l.source);
    ctx.strokeStyle = sn ? COLORS[sn.domain] : "#888";
    ctx.lineWidth = isHL ? 1.5 : 0.5;
    if (l.cross_domain) { ctx.setLineDash([3, 2]); } else { ctx.setLineDash([]); }
    ctx.beginPath();
    const mx = (sx1 + sx2) / 2;
    ctx.moveTo(sx1, sp.sy);
    ctx.bezierCurveTo(mx, sp.sy, mx, tp.sy, sx2, tp.sy);
    ctx.stroke();
  });
  ctx.globalAlpha = 1;
  ctx.setLineDash([]);

  // ── Nodes ──
  // Semantic zoom: determine what to show
  const pixPerYear = zoomX * (WORLD_W / 2526); // rough px per year
  const showLabels = pixPerYear > 8;
  const showFoundationalLabels = pixPerYear > 2;
  const nodeR = Math.max(1.5, Math.min(4, 2.5));

  // Sort: foundational first for priority rendering
  const sorted = [...nodes].sort((a, b) => (b.status === "foundational" ? 1 : 0) - (a.status === "foundational" ? 1 : 0));

  // Label collision: simple horizontal skip
  const usedLabelSlots = [];
  function canPlaceLabel(sx, sy, textW) {
    for (const s of usedLabelSlots) {
      if (Math.abs(sy - s.y) < 10 && sx < s.x + s.w + 4 && sx + textW > s.x - 4) return false;
    }
    return true;
  }

  sorted.forEach(n => {
    const p = posMap.get(n.id);
    if (!p) return;
    const sx = xToScreen(p.wx);
    if (sx < -10 || sx > W + 10) return;

    const isFnd = n.status === "foundational";
    const isHov = hovered && hovered.id === n.id;
    const isSel = selected && selected.id === n.id;
    const isConn = hlId && (n.id === hlId || (linkIdx.has(n.id) && linkIdx.get(n.id).some(i => connSet.has(i))));

    const r = isHov ? 6 : isSel ? 5 : isFnd ? nodeR * 1.4 : nodeR;
    ctx.globalAlpha = hlId ? (isConn || isHov ? 1 : 0.12) : (isFnd ? 0.85 : 0.55);

    ctx.fillStyle = COLORS[n.domain];
    ctx.beginPath(); ctx.arc(sx, p.sy, r, 0, Math.PI * 2); ctx.fill();

    if (isHov || isSel) {
      ctx.strokeStyle = dark ? "#444" : "#fff";
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }

    // Label
    const wantLabel = showLabels || (showFoundationalLabels && isFnd) || isHov || isSel;
    if (wantLabel && n.name_ja) {
      const fs = isHov || isSel ? 11 : isFnd ? 9 : 8;
      ctx.font = `${isFnd ? 500 : 400} ${fs}px "Noto Sans JP", sans-serif`;
      const tw = ctx.measureText(n.name_ja).width;
      const lx = sx + r + 3, ly = p.sy + fs / 3;

      if (isHov || isSel || canPlaceLabel(lx, ly, tw)) {
        ctx.fillStyle = dark ? "rgba(255,255,255,0.75)" : "rgba(0,0,0,0.7)";
        ctx.globalAlpha = hlId ? (isConn || isHov ? 0.9 : 0.1) : 0.8;
        ctx.fillText(n.name_ja, lx, ly);
        if (!isHov && !isSel) usedLabelSlots.push({ x: lx, y: ly, w: tw });
      }
    }
    ctx.globalAlpha = 1;
  });
}

// ── Ruler ──
function drawRuler() {
  rCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const rw = rCvs.width / dpr, rh = 24;
  rCtx.clearRect(0, 0, rw, rh);
  const dark = document.documentElement.dataset.theme === "dark";

  const pxPY = zoomX * (WORLD_W / 2526);
  let interval = 500;
  if (pxPY > 0.5) interval = 200;
  if (pxPY > 1.5) interval = 100;
  if (pxPY > 4) interval = 50;
  if (pxPY > 10) interval = 20;
  if (pxPY > 25) interval = 10;

  rCtx.font = '9px "Noto Sans JP", sans-serif';
  rCtx.textAlign = "center";

  for (let y = -500; y <= 2026; y += interval) {
    const rx = xToScreen(eraToX(y));
    if (rx < -30 || rx > rw + 30) continue;
    const major = y % 500 === 0;
    rCtx.strokeStyle = dark ? "rgba(255,255,255,0.2)" : "rgba(0,0,0,0.15)";
    rCtx.lineWidth = major ? 1 : 0.5;
    rCtx.beginPath(); rCtx.moveTo(rx, major ? 5 : 15); rCtx.lineTo(rx, rh); rCtx.stroke();
    if (major || interval <= 100) {
      rCtx.fillStyle = dark ? "rgba(255,255,255,0.5)" : "rgba(0,0,0,0.5)";
      rCtx.fillText(y < 0 ? `${Math.abs(y)}BCE` : `${y}`, rx, 12);
    }
  }
}

// ═══════ Animation ═══════
function requestRedraw() { _redraw = true; }
function loop() {
  if (_redraw) { draw(); drawRuler(); _redraw = false; }
  requestAnimationFrame(loop);
}

// ═══════ Hit test ═══════
function hitTest(sx, sy) {
  let best = null, bestD = 12;
  for (const n of nodes) {
    const p = posMap.get(n.id);
    if (!p) continue;
    const nx = xToScreen(p.wx);
    const dx = nx - sx, dy = p.sy - sy;
    const d = Math.sqrt(dx * dx + dy * dy);
    if (d < bestD) { best = n; bestD = d; }
  }
  return best;
}

// ═══════ Panel ═══════
function showPanel(node) {
  selected = node;
  const panel = document.getElementById("panel");
  const body = document.getElementById("panelBody");
  const era = node.era_start < 0 ? `${Math.abs(node.era_start)} BCE` : node.era_start;
  const connLinks = links.filter(l => l.source === node.id || l.target === node.id);
  let connHTML = "";
  if (connLinks.length) {
    connHTML = `<div class="p-conn"><h4>関連 (${connLinks.length})</h4>`;
    connLinks.forEach(l => {
      const oid = l.source === node.id ? l.target : l.source;
      const o = nodeMap.get(oid);
      if (o) connHTML += `<div class="p-conn-item" data-id="${oid}">${l.source === node.id ? "&rarr;" : "&larr;"} ${o.name_ja} (${o.era_start})</div>`;
    });
    connHTML += "</div>";
  }
  body.innerHTML = `
    <div class="p-dom" style="color:${COLORS[node.domain]}">${DLABEL[node.domain]}</div>
    <div class="p-name">${node.name_ja}</div>
    <div class="p-en">${node.name_en || ""}</div>
    <div class="p-era">${era}年〜</div>
    ${node.definition ? `<div class="p-def">${node.definition}</div>` : ""}
    <div class="p-tags">${node.subfield ? `<span>${node.subfield}</span>` : ""}${node.school ? `<span>${node.school}</span>` : ""}</div>
    ${connHTML}`;
  panel.classList.add("open");
  body.querySelectorAll(".p-conn-item").forEach(el => {
    el.addEventListener("click", () => {
      const t = nodeMap.get(el.dataset.id);
      if (t) { showPanel(t); const tp = posMap.get(t.id); if (tp) { offsetX = W / 2 - tp.wx * zoomX; requestRedraw(); } }
    });
  });
  requestRedraw();
}
function closePanel() { document.getElementById("panel").classList.remove("open"); selected = null; requestRedraw(); }

// ═══════ Events ═══════
cvs.addEventListener("mousedown", e => {
  dragging = true; dragSX = e.clientX; dragOX = offsetX;
  hovered = null;
});
cvs.addEventListener("mousemove", e => {
  const rect = cvs.getBoundingClientRect();
  if (dragging) {
    offsetX = dragOX + (e.clientX - dragSX);
    requestRedraw();
  } else {
    const prev = hovered;
    hovered = hitTest(e.clientX - rect.left, e.clientY - rect.top);
    if (hovered !== prev) { cvs.style.cursor = hovered ? "pointer" : "grab"; requestRedraw(); }
  }
});
cvs.addEventListener("mouseup", e => {
  if (dragging && Math.abs(e.clientX - dragSX) < 4) {
    const rect = cvs.getBoundingClientRect();
    const n = hitTest(e.clientX - rect.left, e.clientY - rect.top);
    if (n) showPanel(n); else closePanel();
  }
  dragging = false;
});
cvs.addEventListener("mouseleave", () => { dragging = false; if (hovered) { hovered = null; requestRedraw(); } });

cvs.addEventListener("wheel", e => {
  e.preventDefault();
  const rect = cvs.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const factor = e.deltaY > 0 ? 0.9 : 1.1;
  const newZ = Math.max(0.02, Math.min(50, zoomX * factor));
  offsetX = mx - (mx - offsetX) * (newZ / zoomX);
  zoomX = newZ;
  requestRedraw();
}, { passive: false });

// Touch
let lastTD = 0;
cvs.addEventListener("touchstart", e => {
  if (e.touches.length === 1) { dragging = true; dragSX = e.touches[0].clientX; dragOX = offsetX; }
  else if (e.touches.length === 2) { lastTD = Math.abs(e.touches[1].clientX - e.touches[0].clientX); }
}, { passive: true });
cvs.addEventListener("touchmove", e => {
  e.preventDefault();
  if (e.touches.length === 1 && dragging) {
    offsetX = dragOX + (e.touches[0].clientX - dragSX);
    requestRedraw();
  } else if (e.touches.length === 2) {
    const d = Math.abs(e.touches[1].clientX - e.touches[0].clientX);
    const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
    const rect = cvs.getBoundingClientRect();
    const mx = cx - rect.left;
    const factor = d / (lastTD || 1);
    const newZ = Math.max(0.02, Math.min(50, zoomX * factor));
    offsetX = mx - (mx - offsetX) * (newZ / zoomX);
    zoomX = newZ;
    lastTD = d;
    requestRedraw();
  }
}, { passive: false });
cvs.addEventListener("touchend", () => { dragging = false; });

// Controls
document.querySelectorAll(".chip").forEach(c => {
  c.addEventListener("click", () => {
    const d = c.dataset.d;
    c.classList.toggle("on");
    if (c.classList.contains("on")) activeD.add(d); else activeD.delete(d);
    process(); requestRedraw();
  });
});
document.getElementById("rMin").addEventListener("input", e => {
  eraMin = +e.target.value;
  if (eraMin > eraMax) { eraMin = eraMax; e.target.value = eraMin; }
  document.getElementById("evMin").textContent = eraMin < 0 ? eraMin : eraMin;
  process(); requestRedraw();
});
document.getElementById("rMax").addEventListener("input", e => {
  eraMax = +e.target.value;
  if (eraMax < eraMin) { eraMax = eraMin; e.target.value = eraMax; }
  document.getElementById("evMax").textContent = eraMax;
  process(); requestRedraw();
});
let sDeb;
document.getElementById("searchIn").addEventListener("input", e => {
  clearTimeout(sDeb);
  sDeb = setTimeout(() => { query = e.target.value.trim(); process(); requestRedraw(); }, 200);
});

function resetZoom() {
  zoomX = W / WORLD_W * 0.95;
  offsetX = W * 0.025;
  requestRedraw();
}

window.addEventListener("resize", () => { resize(); process(); requestRedraw(); });

// ═══════ Load ═══════
fetch("genealogy_data.json").then(r => r.json()).then(d => {
  data = d;
  document.getElementById("loading").style.display = "none";
  process();
  resetZoom();
  loop();
});
</script>
</body>
</html>
